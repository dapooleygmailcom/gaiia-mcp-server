syntax = "proto3";

package inventory;

service InventoryService {
  rpc GetItem (GetItemRequest) returns (ItemResponse) {}
  rpc UpdateItem (UpdateItemRequest) returns (ItemResponse) {}
}

message GetItemRequest {
  string item_id = 1;
}

message UpdateItemRequest {
  string item_id = 1;
  int32 quantity = 2;
  double price = 3;
}

message ItemResponse {
  string item_id = 1;
  string name = 2;
  int32 quantity = 3;
  double price = 4;
}
